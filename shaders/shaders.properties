iris.features.required = CUSTOM_IMAGES SSBO SEPARATE_HARDWARE_SAMPLERS COMPUTE_SHADERS

# CUSTOM IMAGES
image.sunTransmittanceLUT = sunTransmittanceLUTTex RGBA RGBA16F HALF_FLOAT false false 256 64
image.multipleScatteringLUT = multipleScatteringLUTTex RGBA RGBA16F HALF_FLOAT false false 32 32
image.skyViewLUT = skyViewLUTTex RGBA RGBA16F HALF_FLOAT false false 200 200
image.undistortedShadowMap = undistortedShadowMapTex RED_INTEGER R32UI UNSIGNED_INT true false 256 256
image.shadowImportanceMap = shadowImportanceMapTex RED_INTEGER R32UI UNSIGNED_INT true false 256 256

image.debug = debugtex RGBA RGBA8 unsigned_byte true true 1.0 1.0

# CUSTOM TEXTURES
customTexture.blueNoiseTex = /textures/stbn.bin TEXTURE_3D RGB8 128 128 64 RGB UNSIGNED_BYTE

customTexture.cloudcoveragetex = /textures/cloudcoverage.png
customTexture.cloudshapetex = /textures/cloudshape.bin TEXTURE_3D RGBA8 128 128 128 RGBA UNSIGNED_BYTE
customTexture.clouddetailtex = /textures/clouddetail.bin TEXTURE_3D RGB8 32 32 32 RGB UNSIGNED_BYTE
customTexture.vanillacloudtex = minecraft:textures/environment/clouds.png

# SSBOS
bufferObject.0 = 32

# COLORTEXES
#ifdef SSAO
size.buffer.colortex3 = 0.5 0.5
#endif
size.buffer.colortex4 = 256 2
# size.buffer.colortex7 = 0.5 0.5
size.buffer.colortex8 = 0.5 0.5
size.buffer.colortex9 = 0.5 0.5

# RENDER SETTINGS
separateAo = true

# UNIFORMS
uniform.vec2.resolution = vec2(viewWidth, viewHeight)

uniform.bool.isDay = sunAngle <= 0.5

uniform.vec3.lightDir = vec3(shadowLightPosition.x / 100, shadowLightPosition.y / 100, shadowLightPosition.z / 100)
uniform.vec3.sunDir   = vec3(sunPosition.x / 100, sunPosition.y / 100, sunPosition.z / 100)
uniform.vec3.moonDir = vec3(moonPosition.x / 100, moonPosition.y / 100, moonPosition.z / 100)

# xirreal sent this to the shaderlabs discord in 2021
variable.float.sunVectorX = gbufferModelViewInverse.0.0 * sunPosition.x + gbufferModelViewInverse.1.0 * sunPosition.y + gbufferModelViewInverse.2.0 * sunPosition.z
variable.float.sunVectorY = gbufferModelViewInverse.0.1 * sunPosition.x + gbufferModelViewInverse.1.1 * sunPosition.y + gbufferModelViewInverse.2.1 * sunPosition.z
variable.float.sunVectorZ = gbufferModelViewInverse.0.2 * sunPosition.x + gbufferModelViewInverse.1.2 * sunPosition.y + gbufferModelViewInverse.2.2 * sunPosition.z
variable.float.sunVectorNorm = 1.0 / sqrt((sunVectorX * sunVectorX) + (sunVectorY * sunVectorY) + (sunVectorZ * sunVectorZ))
uniform.vec3.worldSunDir = vec3(sunVectorX * sunVectorNorm, sunVectorY * sunVectorNorm, sunVectorZ * sunVectorNorm)
uniform.vec3.worldMoonDir = vec3(worldSunDir.x * -1, worldSunDir.y * -1, worldSunDir.z * -1)
uniform.vec3.worldLightDir = if(isDay, worldSunDir, worldMoonDir)

# SETTINGS
screen = DEBUG_ENABLE RSM CLOUDS SSAO 

# !AUTOGENERATE
program.world0/composite.enabled = CLOUDS
program.world1/composite.enabled = CLOUDS
program.world-1/composite.enabled = CLOUDS
program.world0/composite1.enabled = CLOUDS
program.world1/composite1.enabled = CLOUDS
program.world-1/composite1.enabled = CLOUDS
program.world0/composite2.enabled = CLOUDS
program.world1/composite2.enabled = CLOUDS
program.world-1/composite2.enabled = CLOUDS
blend.composite14 = ONE ONE ZERO ZERO
blend.composite15 = ONE ONE ZERO ZERO
blend.composite16 = ONE ONE ZERO ZERO
blend.composite17 = ONE ONE ZERO ZERO
program.world0/deferred.enabled = SSAO
program.world1/deferred.enabled = SSAO
program.world-1/deferred.enabled = SSAO
program.world0/deferred1.enabled = RSM
program.world1/deferred1.enabled = RSM
program.world-1/deferred1.enabled = RSM
